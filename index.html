<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalum Café - TV Safe Mode</title>
    <style>
        :root {
            --dalum-blue: #005a87;
            --dalum-gradient: linear-gradient(135deg, #003d5c 0%, #005a87 100%);
            --bg-white: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-color: var(--bg-white) !important;
        }

        .container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .music-section {
            width: 50%;
            height: 100%;
            border-right: 6px solid var(--dalum-blue);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .price-section {
            width: 50%;
            height: 100%;
            background-color: var(--bg-white) !important;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            justify-content: center;
        }

        .header-box {
            background: var(--dalum-gradient);
            width: 100%;
            padding: 15px 0;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        h1 {
            color: white !important;
            margin: 0;
            font-size: 2.2em;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 20px;
            width: 100%;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #f0f4f7;
            border-radius: 8px;
            border-left: 4px solid var(--dalum-blue);
        }

        .item-name {
            font-size: 1.1em;
            font-weight: 700;
            color: #111;
        }

        .price-tag {
            color: var(--dalum-blue);
            font-weight: 800;
            font-size: 1.2em;
        }

        .footer-area {
            margin-top: 30px;
            text-align: center;
            border-top: 2px solid var(--dalum-blue);
            padding-top: 15px;
        }

        .quote {
            font-size: 1em;
            font-style: italic;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        .welcome-msg {
            font-size: 1.4em;
            font-weight: 900;
            color: var(--dalum-blue);
            text-transform: uppercase;
        }

        /* ── POPUP OVERLAY ── */
        #popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        #popup-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        #popup-box {
            width: 70vw;
            max-height: 85vh;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 80px rgba(0,0,0,0.7), 0 0 0 4px #fff;
            transform: scale(0.7) translateY(60px);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
            opacity: 0;
        }

        #popup-overlay.visible #popup-box {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        #popup-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Countdown bar under billedet */
        #popup-timer-bar {
            height: 6px;
            background: linear-gradient(90deg, #003d5c, #005a87);
            width: 100%;
            transform-origin: left;
            animation: none;
        }

        @keyframes shrink {
            from { transform: scaleX(1); }
            to   { transform: scaleX(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="music-section">
        <iframe src="https://display.soundtrack.io/MGEDYL"></iframe>
    </div>

    <div class="price-section">
        <div class="header-box">
            <h1>Dalum Café</h1>
        </div>

        <div class="menu-grid">
            <div class="menu-item"><span class="item-name">Øl</span> <span class="price-tag">25,-</span></div>
            <div class="menu-item"><span class="item-name">Vand</span> <span class="price-tag">20,-</span></div>

            <div class="menu-item"><span class="item-name">Shakere</span> <span class="price-tag">25,-</span></div>
            <div class="menu-item"><span class="item-name">Booster</span> <span class="price-tag">30,-</span></div>

            <div class="menu-item"><span class="item-name">Sodavand</span> <span class="price-tag">20,-</span></div>
            <div class="menu-item"><span class="item-name">Toast</span> <span class="price-tag">15,-</span></div>

            <div class="menu-item"><span class="item-name">Cocio</span> <span class="price-tag">20,-</span></div>
            <div class="menu-item"><span class="item-name">Chips</span> <span class="price-tag">20,-</span></div>

            <div class="menu-item"><span class="item-name">Astronaut Spec.</span> <span class="price-tag">55,-</span></div>
            <div class="menu-item"><span class="item-name">Dalum Spec.</span> <span class="price-tag">55,-</span></div>

            <div class="menu-item"><span class="item-name">Champagnebrus</span> <span class="price-tag">40,-</span></div>
            <div class="menu-item"><span class="item-name">Kasse Shaker</span> <span class="price-tag">550,-</span></div>

            <div class="menu-item"><span class="item-name">Fustage øl</span> <span class="price-tag">900,-</span></div>
            <div class="menu-item"><span class="item-name">Taste of Turkey</span> <span class="price-tag">10,-</span></div>
        </div>

        <div class="footer-area">
            <span class="quote">"En god dag starter med kaffe - men ender altid med øl"</span>
            <div class="welcome-msg">Velkommen på Dalum</div>
        </div>
    </div>
</div>

<!-- POPUP -->
<div id="popup-overlay">
    <div id="popup-box">
        <img id="popup-img" src="" alt="Pølse med brød tilbud" />
        <div id="popup-timer-bar"></div>
    </div>
</div>

    const SHOW_EVERY_MS  = 3 * 60 * 1000; // 5 minutter mellem hver popup
    const SHOW_FOR_MS    = 3 * 60 * 1000; // popup synlig i 5 minutter

    const overlay  = document.getElementById('popup-overlay');
    const bar      = document.getElementById('popup-timer-bar');
    const img      = document.getElementById('popup-img');

    img.src = POPUP_IMG_SRC;

    function showPopup() {
        overlay.classList.add('visible');

        // Start nedtællings-bar
        bar.style.animation = 'none';
        bar.offsetHeight; // reflow
        bar.style.animation = `shrink ${SHOW_FOR_MS}ms linear forwards`;

        // Skjul igen efter SHOW_FOR_MS
        setTimeout(hidePopup, SHOW_FOR_MS);
    }

    function hidePopup() {
        overlay.classList.remove('visible');
    }

    // Vis første gang efter 5 minutter, derefter hvert 10. minut (5 vis + 5 pause)
    setTimeout(function tick() {
        showPopup();
        setTimeout(tick, SHOW_FOR_MS + SHOW_EVERY_MS);
    }, SHOW_EVERY_MS);
</script>
