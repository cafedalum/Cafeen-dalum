<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalum Café TV - Hvid baggrund</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            background-color: #ffffff !important; /* Tvinger hvid baggrund */
        }

        .container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* Venstre side: Musik */
        .music-section {
            width: 50%;
            height: 100%;
            border-right: 5px solid #005a87;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Højre side: Prisliste */
        .price-section {
            width: 50%;
            height: 100%;
            background-color: #ffffff !important; /* Tvinger hvid baggrund på selve sektionen */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Starter fra toppen */
            padding: 20px 40px;
            box-sizing: border-box;
        }

        .header-box {
            background-color: #005a87;
            width: 100%;
            padding: 10px 0;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        h1 {
            color: #ffffff;
            margin: 0;
            font-size: 2em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Tabel med mindre skrift for at sikre plads */
        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .price-table td {
            padding: 6px 15px; /* Mindre luft mellem linjerne */
            font-size: 1.15em; /* Mindre skriftstørrelse så alt kan være der */
            border-bottom: 1px solid #eeeeee;
        }

        .item-name {
            text-align: left;
            font-weight: 700;
            color: #1a1a1a;
        }

        .price-value {
            text-align: right;
            color: #005a87;
            font-weight: 800;
            white-space: nowrap;
        }

        /* Quote & Footer samlet tæt i bunden */
        .bottom-section {
            margin-top: auto; /* Skubber denne del helt til bunden */
            padding-bottom: 15px;
            width: 100%;
            text-align: center;
            border-top: 3px solid #005a87;
            padding-top: 10px;
        }

        .quote-text {
            font-size: 1.1em;
            font-style: italic;
            color: #444444;
            display: block;
            margin-bottom: 5px;
        }

        .footer {
            font-weight: 800;
            color: #005a87;
            font-size: 1.3em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="music-section">
        <iframe src="https://display.soundtrack.io/MGEDYL"></iframe>
    </div>

    <div class="price-section">
        <div class="header-box">
            <h1>Cafeen Dalum</h1>
        </div>
        
        <table class="price-table">
            <tr><td class="item-name">Øl</td><td class="price-value">25,-</td></tr>
            <tr><td class="item-name">Shakere</td><td class="price-value">25,-</td></tr>
            <tr><td class="item-name">Astronaut-special & Dalum-special</td><td class="price-value">55,-</td></tr>
            <tr><td class="item-name">Champagnebrus & Astronaut</td><td class="price-value">40,-</td></tr>
            <tr><td class="item-name">Sodavand</td><td class="price-value">20,-</td></tr>
            <tr><td class="item-name">Cocio</td><td class="price-value">20,-</td></tr>
            <tr><td class="item-name">Vand</td><td class="price-value">15,-</td></tr>
            <tr><td class="item-name">Faxekondi booster</td><td class="price-value">30,-</td></tr>
            <tr><td class="item-name">Toast</td><td class="price-value">15,-</td></tr>
            <tr><td class="item-name">Chips</td><td class="price-value">20,-</td></tr>
            <tr><td class="item-name">Kasse shaker</td><td class="price-value">575,-</td></tr>
            <tr><td class="item-name">Fustage øl</td><td class="price-value">900,-</td></tr>
        </table>
        
        <div class="bottom-section">
            <span class="quote-text">"En god dag starter med kaffe - men ender altid med øl"</span>
            <div class="footer">Velkommen i caféen</div>
        </div>
    </div>
</div>

</body>
</html>
